<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animaciones</title>

 <style>
    .boton-magico {
background-color: rgb(0, 0, 0);
color: white;
padding: 15px;
transform: scale(1); /* Tamaño original */
/* Le decimos que cualquier cambio de estilo tardará medio segundo de forma fluida */
transition: all 1s ease;
}
.boton-magico:hover {
background-color: rgba(154, 145, 150, 0.082);
transform: scale(1.3); /* Crece un 10% al pasar el mouse */
}
 </style>

</head>
<body>
    <button class="boton-magico">Pasa el ratón por aquí</button>
    
</body>
</html>
