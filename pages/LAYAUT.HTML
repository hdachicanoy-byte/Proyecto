<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>

.contenedor-layout {
display: flex; /* Permite colocar las columnas una al lado de la otra */
}
.columna-principal {
width: 65%; /* Ocupará el 65% del ancho de la pantalla */
background-color: #e3f2fd;
}
.columna-lateral {
width: 30%; /* Ocupará el 30%, dejando un 5% de espacio libre */
background-color: #d209dc;
}

  </style>

 |
</head>
<body>

   <div class="contenedor-layout">
<section class="columna-principal">
<h2>Contenido Principal</h2>
</section>
<aside class="columna-lateral">
<h2>Enlaces Útiles</h2>
</aside>
</div>
    
</body>
</html>
