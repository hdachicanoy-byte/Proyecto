        // Comparación
        let nivel = 5;
        console.log(nivel === 5); // true (verdadero)
        // Lógicos
        let tieneLlave = true;
        let nivelCompletado = true;
        if (tieneLlave && nivelCompletado) { // Requiere que AMBAS sean verdaderas

        }
