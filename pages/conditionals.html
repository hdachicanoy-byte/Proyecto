<body>
    <div class="navigation-controls">

    <h1>Condicionales en JavaScript</h1>

    <script>
        //prompt permite leer un valor desde teclado
        let edad = prompt("Diga su edad");

        if (edad >= 18)
            alert("Usted es MAYOR es edad")
        else
            alert("usted es MENOR de edad")



        //
        let calificacion = prompt("introduzca su calificacion")

        if (calificacion < 3.5)
            alert("desempeño BAJO")
        else if (calificacion < 4)
            alert("desempeño BASICO")
        else if (calificacion < 4.5)
            alert("desempeño ALTO")
        else if (calificacion <= 5)
            alert("desempeño SUPERIOR")
        else 
         alert("calificacion NO ES VALIDA")
        
    </script>

    <script src="../js/app.js"></script>
</body>
