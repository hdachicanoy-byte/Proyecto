<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funciones</title>
    <link rel="stylesheet" href="../css/style.css">


    <script>
        function mayor_edad(edad) {
            let mayor = false;
            if (edad >= 18)
                mayor = true
            else
                mayor = false;
            return mayor;
        }

        function hello(name){
               alert("hello, welcome to my webpage " + name)
        }

        // Ejemplo con valor 15
        console.log(mayor_edad(15));

        //Ejemplo con valor 18
        console.log(mayor_edad(18));

        let name = prompt("dame te nombre")
        hello(name);


        let age = prompt("ingresa tu edad");

        if (mayor_edad(age)){
            //mayor de edad permite ingreso a la pagina
            alert("Bienvenido");
        } else
        { 
            //menor de edad restrnge
            alert("no puedes ingresar a la web");
        }
    </script>
</head>
